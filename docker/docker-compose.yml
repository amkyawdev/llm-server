version: '3.8'

services:
  llm-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm-server
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_NAME=llama-2-7b
      - MODEL_DEVICE=cuda
      - MODEL_QUANTIZATION=4bit
      - LOG_LEVEL=INFO
      - CACHE_ENABLED=true
    volumes:
      - ../data/models:/workspace/project/llm-server/data/models
      - ../data/cache:/workspace/project/llm-server/data/cache
      - ../data/logs:/workspace/project/llm-server/data/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: llm-server-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-server-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data: